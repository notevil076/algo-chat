<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Algo | notevil-net</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://img.icons8.com/isometric/512/00ff41/skull.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --surface: #161616; --accent: #00ff41; --text: #e0e0e0; --mine: #004d1a; --sidebar: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 10; transition: 0.3s ease; }
        .search-box { padding: 15px; border-bottom: 1px solid #222; }
        .search-box input { width: 100%; background: #222; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-size: 14px; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        header { background: var(--surface); padding: 15px 20px; border-bottom: 1px solid #222; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 15px; min-height: 60px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .mine { align-self: flex-end; background: var(--mine); border-bottom-right-radius: 2px; }
        .theirs { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        form { background: var(--surface); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #m { flex: 1; background: #0d0d0d; border: 1px solid #333; border-radius: 20px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }
        
        .back-btn { display: none; background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 0; }

        /* Mobile View Fix */
        @media (max-width: 768px) {
            .sidebar { position: fixed; inset: 0; width: 100%; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: block; }
        }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .auth-card { background: var(--surface); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 350px; text-align: center; }
        .auth-card input { width: 100%; background: #222; border: 1px solid #333; padding: 12px; margin-bottom: 15px; border-radius: 8px; color: white; outline: none; }
        .auth-card button { width: 100%; background: var(--accent); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--accent); letter-spacing: 5px;">ALGO</h1>
            <input type="text" id="u" placeholder="Логин">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="auth('login')">ВХОД</button>
            <button onclick="auth('register')" style="background:none; color:var(--accent); border:1px solid var(--accent); margin-top:10px;">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="search-box">
            <input type="text" id="search" placeholder="Поиск //user + Enter" onkeyup="handleSearch(event)">
        </div>
        <div id="chat-list"></div>
    </div>

    <div class="chat-area">
        <header>
            <button class="back-btn" onclick="toggleView('list')">←</button>
            <div id="chat-header">ALGO_DM</div>
        </header>
        <div id="messages"></div>
        <form id="msg-form" onsubmit="send(event)" style="display:none;">
            <input type="text" id="m" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" style="width:50px; height:50px; border-radius: 50%; background: var(--accent); border:none; color:black; font-weight:bold;">↑</button>
        </form>
    </div>

    <script>
        // Жёсткая проверка авторизации при загрузке
    (function() {
    const user = localStorage.getItem('algo_user');
    // Если юзер пустой, равен строке "null" или "undefined" — чистим всё и стопаем
    if (!user || user === "null" || user === "undefined" || user === "") {
        localStorage.clear(); 
        console.log("Auth failed, showing login screen...");
    } else {
        console.log("Logged in as: " + user);
        // Скрываем экран логина, если юзер реально есть
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('auth-screen').style.display = 'none';
        });
    }
        })();

        let me = localStorage.getItem('algo_user'), ws, currentRecipient = null;
        let activeChats = JSON.parse(localStorage.getItem('chats_' + me) || "[]");

        if (me) {
            document.getElementById('auth-screen').style.display = 'none';
            if (Notification.permission !== 'granted') Notification.requestPermission();
            renderChatList();
            initWS();
        }

        function toggleView(view) {
            const sidebar = document.getElementById('sidebar');
            if (view === 'chat') sidebar.classList.add('hidden');
            else sidebar.classList.remove('hidden');
        }

        async function auth(type) {
            const username = document.getElementById('u').value.trim();
            const password = document.getElementById('p').value.trim();
            const res = await fetch('/' + type, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
            if (res.ok) { localStorage.setItem('algo_user', username); location.reload(); }
            else alert("Ошибка доступа");
        }

        function initWS() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/${me}`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if (!activeChats.includes(d.sender)) {
                    activeChats.push(d.sender);
                    saveChats();
                    renderChatList();
                }
                if (currentRecipient === d.sender) render(d.text, 'theirs');
                else new Notification(`//${d.sender}`, { body: d.text });
            };
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                const target = e.target.value.replace('//', '').trim();
                const res = await fetch(`/search_user?q=${target}`);
                const data = await res.json();
                if (data.exists) {
                    if (!activeChats.includes(target)) { activeChats.push(target); saveChats(); renderChatList(); }
                    openChat(target);
                    e.target.value = '';
                } else alert("Объект не найден в сети");
            }
        }

        function saveChats() { localStorage.setItem('chats_' + me, JSON.stringify(activeChats)); }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            activeChats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentRecipient === chat ? 'active' : ''}`;
                div.innerHTML = `<div style="width:35px;height:35px;background:#222;border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;">${chat[0].toUpperCase()}</div> ${chat}`;
                div.onclick = () => openChat(chat);
                list.appendChild(div);
            });
        }

        async function openChat(recipient) {
            currentRecipient = recipient;
            document.getElementById('chat-header').innerText = `//${recipient}`;
            document.getElementById('msg-form').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            toggleView('chat');
            renderChatList();
            const res = await fetch(`/history?me=${me}&other=${recipient}`);
            const history = await res.json();
            history.forEach(m => render(m.text, m.sender === me ? 'mine' : 'theirs'));
        }

        function render(txt, cls) {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.innerText = txt;
            const box = document.getElementById('messages');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function send(e) {
        e.preventDefault();
        const text = document.getElementById('m').value;
        const msg = { sender: me, recipient: currentRecipient, text: text };
        console.log("Sending message:", msg); // Увидишь, правильный ли recipient
        ws.send(JSON.stringify(msg));
        document.getElementById('m').value = '';
        }       

    </script>
</body>
</html>
