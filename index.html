<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Algo | notevil-net</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #00ff41;
            --text: #e0e0e0;
            --mine: #004d1a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        #auth-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px;
        }

        .auth-card {
            background: var(--surface); padding: 30px; border-radius: 12px;
            border: 1px solid #333; width: 100%; max-width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        h1 { color: var(--accent); text-align: center; letter-spacing: 2px; }

        input {
            width: 100%; background: #262626; border: 1px solid #333;
            padding: 12px; margin-bottom: 15px; border-radius: 8px;
            color: white; box-sizing: border-box; outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%; background: var(--accent); color: black;
            border: none; padding: 12px; border-radius: 8px;
            font-weight: 600; cursor: pointer;
        }

        .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; }

        header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 1px solid #333; color: var(--accent); font-weight: 600; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 12px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .mine { align-self: flex-end; background: var(--mine); border-bottom-right-radius: 2px; border-color: var(--accent); }
        .theirs { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 2px; }
        .sender { font-size: 10px; color: var(--accent); opacity: 0.7; margin-bottom: 4px; display: block; }
        #input-area { background: var(--surface); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>ALGO</h1>
            <input type="text" id="userInp" placeholder="Логин">
            <input type="password" id="passInp" placeholder="Пароль">
            <button onclick="handleAuth('login')">ВХОД</button>
            <button class="btn-secondary" onclick="handleAuth('register')">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="chat-content" style="display:none; flex-direction: column; height: 100vh;">
        <header>notevil-net // algo_core</header>
        <div id="messages"></div>
        <form id="input-area" onsubmit="send(event)">
            <input type="text" id="msgInp" placeholder="Введите сообщение..." autocomplete="off">
            <button type="submit" style="width: 60px;">↑</button>
        </form>
    </div>

    <script>
        let currentUser = localStorage.getItem('algo_user');
        let ws;

        if (currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-content').style.display = 'flex';
            initChat();
        }

        async function handleAuth(type) {
            const username = document.getElementById('userInp').value.trim();
            const password = document.getElementById('passInp').value.trim();
            if (!username || !password) return alert("Заполните поля");

            try {
                const res = await fetch(`/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('algo_user', username);
                    window.location.reload();
                } else {
                    alert(data.detail || "Ошибка");
                }
            } catch (e) { alert("Сервер недоступен"); }
        }

        async function initChat() {
            try {
                const res = await fetch('/history');
                const history = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (Array.isArray(history)) {
                    history.forEach(m => render(m.text, m.sender === currentUser ? 'mine' : 'theirs', m.sender));
                }
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.sender !== currentUser) render(data.text, 'theirs', data.sender);
                };
            } catch (e) { console.error("Init error", e); }
        }

        function render(text, type, sender) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<span class="sender">${sender}</span>${text}`;
            const container = document.getElementById('messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function send(e) {
            e.preventDefault();
            const inp = document.getElementById('msgInp');
            if (inp.value.trim() && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({sender: currentUser, text: inp.value}));
                render(inp.value, 'mine', currentUser);
                inp.value = '';
            }
        }
    </script>
</body>
</html>
